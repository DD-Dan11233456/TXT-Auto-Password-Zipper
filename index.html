<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Document Zipper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zip.js/2.7.53/zip.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #222;
            font-weight: 600;
            text-align: center;
        }

        .text-container {
            position: relative;
            width: 100%;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
            overflow-y: hidden;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: flex-end;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
        }

        .input-group input {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            height: 41px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Secure Document Notepad</h2>
        
        <div class="text-container">
            <textarea id="messageBox" placeholder="Start typing your document here... It will automatically expand as you write."></textarea>
        </div>

        <div class="controls">
            <div class="input-group">
                <label for="fileName">Zip File Name</label>
                <input type="text" id="fileName" placeholder="my-secure-file" value="secret_document">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter encryption password">
            </div>

            <button id="zipBtn">Zip & Encrypt</button>
        </div>
    </div>

    <script>
        const messageBox = document.getElementById('messageBox');
        const fileNameInput = document.getElementById('fileName');
        const passwordInput = document.getElementById('password');
        const zipBtn = document.getElementById('zipBtn');

        // 1. Auto-expand Textarea Logic
        messageBox.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // 2. Encrypted Zip and Download Logic using zip.js
        zipBtn.addEventListener('click', async function () {
            const textContent = messageBox.value.trim();
            let fileName = fileNameInput.value.trim() || 'document';
            const password = passwordInput.value;

            if (!textContent) {
                alert('Please write some text in the box before zipping.');
                return;
            }

            if (!password) {
                alert('Please enter a password to encrypt your file.');
                return;
            }

            // Standardize zip filename extension
            if (fileName.toLowerCase().endsWith('.zip')) {
                fileName = fileName.slice(0, -4);
            }

            zipBtn.disabled = true;
            zipBtn.innerText = "Encrypting...";

            try {
                // Initialize the zip file in a virtual stream data container (Blob)
                const blobWriter = new zip.BlobWriter("application/zip");
                const zipWriter = new zip.ZipWriter(blobWriter);

                // Add document.txt into the zip file container
                // 'password' assigns encryption; zip.js natively uses Standard ZipCrypto / AES 
                await zipWriter.add("document.txt", new zip.TextReader(textContent), {
                    password: password,
                    zipCrypto: true // Makes it compatible across basic native OS extractors
                });

                // Close and compile the zip file
                await zipWriter.close();
                const finalZipBlob = await blobWriter.getData();

                // Handle downloading the compiled blob automatically
                const link = document.createElement('a');
                link.href = URL.createObjectURL(finalZipBlob);
                link.download = `${fileName}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (error) {
                alert("An error occurred during encryption: " + error.message);
                console.error(error);
            } finally {
                zipBtn.disabled = false;
                zipBtn.innerText = "Zip & Encrypt";
            }
        });
    </script>
</body>
</html>
